<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0f1e;--card:#131a2e;--card2:#1a2240;--border:#222d4a;--text:#e8ecf4;--muted:#8893ab;--dim:#5a6580;--blue:#3b7dff;--blue2:#2860d8;--green:#22c55e;--green-d:#166534;--amber:#f59e0b;--amber-d:#92400e;--red:#ef4444;--red-d:#991b1b;--radius:14px;--radius-sm:10px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;min-height:100dvh;max-width:520px;margin:0 auto;position:relative;overflow-x:hidden}
input,textarea,button,select{font-family:inherit;font-size:14px}
a{color:var(--blue);text-decoration:none}
.hdr{display:flex;align-items:center;gap:10px;padding:16px 16px 14px;background:var(--bg);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
.hdr h1{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:12px;color:var(--dim)}

.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.save-ind{position:fixed;top:14px;right:14px;z-index:99;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;transition:all .3s;pointer-events:none;opacity:0}
.save-ind.saved{background:#166534;color:#6ee7b7;opacity:1}
.save-ind.saving{background:#92400e;color:#fbbf24;opacity:1}
.tabs{display:flex;overflow-x:auto;gap:0;border-bottom:1px solid var(--border);background:var(--card);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 16px;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.content{padding:14px 16px 100px}
.card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;cursor:pointer;border:1px solid var(--border);transition:border-color .2s}
.card:active{border-color:var(--blue)}.card-static{cursor:default}.card-static:active{border-color:var(--border)}
.form-card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:10px;border:1px solid var(--blue)33}
.input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;margin-bottom:10px;outline:none}
.input:focus{border-color:var(--blue)}
.textarea{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;resize:vertical;outline:none}
.textarea:focus{border-color:var(--blue)}
.label{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;display:block}
.field{margin-bottom:14px}
.toggle-row{display:flex;gap:8px;margin-bottom:14px}
.toggle-btn{flex:1;padding:10px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;text-align:center;border:1px solid var(--border);background:var(--card);color:var(--dim)}
.toggle-btn.t-e{background:#065f4622;color:#6ee7b7;border-color:#065f46}
.toggle-btn.t-s{background:#7c2d1222;color:#fdba74;border-color:#7c2d12}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block}
.badge-e{background:#065f46;color:#6ee7b7}.badge-s{background:#7c2d12;color:#fdba74}
.badge-w{background:#92400e44;color:var(--amber);font-size:10px;padding:2px 8px}
.btn{padding:10px 20px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;cursor:pointer;text-align:center;width:100%}
.btn:active{opacity:.8}
.btn-p{background:var(--blue);color:#fff}
.btn-s{background:var(--border);color:var(--muted);font-weight:500}
.btn-d{background:var(--red-d);color:#fca5a5;font-weight:500;font-size:13px}
.btn-row{display:flex;gap:8px}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.room-tabs{display:flex;overflow-x:auto;gap:6px;padding:0 0 10px;scrollbar-width:none}
.room-tabs::-webkit-scrollbar{display:none}
.room-tab{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--dim);white-space:nowrap;flex-shrink:0}

.el-dot{width:8px;height:8px;border-radius:4px;flex-shrink:0}
.el-name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.ec{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0 14px}
.ech{padding:5px 11px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:500;border:1px solid var(--border);background:var(--bg);color:var(--dim);user-select:none}
.pb{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;margin-top:6px}
.pw{position:relative;width:68px;height:68px;flex-shrink:0}
.pt{width:68px;height:68px;border-radius:var(--radius-sm);object-fit:cover;border:1px solid var(--border);cursor:pointer;background:var(--bg);display:block}
.pd{position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:10px;background:var(--red-d);color:#fca5a5;border:2px solid var(--card);font-size:11px;line-height:16px;text-align:center;cursor:pointer}
.pa{width:68px;height:68px;border-radius:var(--radius-sm);border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:16px;flex-shrink:0;background:var(--bg)}
.pa:active{border-color:var(--blue);color:var(--blue)}
.lb{position:fixed;inset:0;background:#000e;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.lb img{max-width:95vw;max-height:70vh;border-radius:8px;object-fit:contain}

.ann-ov{position:fixed;inset:0;background:#000;z-index:110;display:flex;flex-direction:column}

.ann-tb{display:flex;gap:6px;padding:10px 14px;background:#111;justify-content:center;flex-wrap:wrap}
.ann-t{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #333;background:#222;color:#aaa;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.ann-t.active{border-color:var(--blue);color:var(--blue);background:#1a2240}
.sig-pad{border:2px dashed var(--border);border-radius:var(--radius-sm);background:#fff;touch-action:none;cursor:crosshair;display:block;margin:6px 0;width:100%;max-width:360px}
.sig-prev{max-width:200px;max-height:80px;border:1px solid var(--border);border-radius:8px;background:#fff;display:block;margin:4px 0}
.sr{margin-bottom:16px}.sr-t{font-weight:700;font-size:15px;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px}
.se{display:flex;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)11}
.se-n{flex:1;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.se-c{min-width:80px;text-align:center;font-size:12px;font-weight:500}
.diff-r{background:#f59e0b11;border-left:3px solid var(--amber);padding:6px 8px;border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.diff-b{font-size:10px;background:var(--amber-d);color:var(--amber);padding:1px 6px;border-radius:8px;margin-left:6px}
.fb{display:flex;gap:6px;margin-bottom:12px}
.fb-b{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--dim)}
.fb-b.active{border-color:var(--amber);color:var(--amber);background:var(--amber)11}
.ex-c{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;border:1px solid var(--border)}
.ex-c h3{font-size:14px;font-weight:700;margin-bottom:4px}.ex-c p{font-size:12px;color:var(--dim);margin-bottom:10px}
.ck-r{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)33}
.ck-l{flex:1;font-size:13px}
.ck-i{width:90px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;text-align:center}
.fab{position:fixed;bottom:24px;right:24px;min-width:56px;height:56px;border-radius:28px;background:var(--blue);color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 20px #3b7dff44;display:flex;align-items:center;justify-content:center;z-index:20;padding:0 20px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text);padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;box-shadow:0 4px 20px #00000066;z-index:30;animation:fu .25s}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ov{position:fixed;inset:0;background:#000b;display:flex;align-items:center;justify-content:center;z-index:50;padding:24px}
.mo{background:var(--card);border-radius:var(--radius);padding:24px;max-width:360px;width:100%;border:1px solid var(--border)}
@media print{body{background:#fff;color:#000;max-width:none;font-size:11px}.hdr,.tabs,.fab,.pa,.pd,.btn,.btn-row,.ov,.toast,.save-ind,.ann-tb,.fb{display:none!important}.content{padding:0}.card,.el-card,.form-card,.ex-c{background:#fff;border:1px solid #ddd;break-inside:avoid}.el-det{display:block!important}.pt{width:50px;height:50px}.sig-pad{display:none}@page{margin:15mm}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>

<script>
const T={"Entrée / Couloir":["Sol","Plinthes","Murs","Plafond","Porte d'entrée","Serrure","Interphone/Digicode","Boîte aux lettres","Patère/Porte-manteau","Interrupteur(s)","Prise(s) électrique(s)","Éclairage","Détecteur fumée"],"Salon / Séjour":["Sol","Plinthes","Murs","Plafond","Porte","Fenêtre(s) + vitrage","Volets / Stores","Interrupteur(s)","Prise(s) électrique(s)","Éclairage / Luminaire","Radiateur / Chauffage"],"Cuisine":["Sol","Plinthes","Murs","Plafond","Porte","Fenêtre(s) + vitrage","Volets / Stores","Plan de travail","Évier","Robinetterie","Plaques de cuisson","Four","Hotte","Réfrigérateur","Lave-vaisselle","Placards hauts","Placards bas","Crédence","VMC","Interrupteur(s)","Prise(s) électrique(s)","Éclairage"],"Chambre":["Sol","Plinthes","Murs","Plafond","Porte","Fenêtre(s) + vitrage","Volets / Stores","Interrupteur(s)","Prise(s) électrique(s)","Éclairage / Luminaire","Radiateur / Chauffage","Placard/Penderie","Étagères","Tringle"],"Salle de bain":["Sol","Plinthes","Murs","Plafond","Porte","Baignoire OU Douche","Paroi/Rideau","Lavabo","Robinetterie","Miroir","Sèche-serviettes","VMC/Ventilation","Joints silicone","Carrelage mural","Interrupteur(s)","Prise(s) électrique(s)","Éclairage"],"WC":["Sol","Plinthes","Murs","Plafond","Porte","Cuvette","Abattant","Chasse d'eau","Porte-rouleau","Lave-mains","Interrupteur(s)","Éclairage"],"Balcon / Terrasse":["Sol / Revêtement","Garde-corps","Évacuation eau","Éclairage extérieur","Prise extérieure"],"Cave / Parking":["Sol","Murs","Plafond","Porte","Éclairage","Ventilation"],"Pièce personnalisée":["Sol","Plinthes","Murs","Plafond","Porte","Interrupteur(s)","Prise(s) électrique(s)","Éclairage"]};
const ET=["Neuf","Bon","Usure normale","Dégradé","Mauvais","N/A"];
const EC={"Neuf":"#22c55e","Bon":"#4ade80","Usure normale":"#f59e0b","Dégradé":"#ef4444","Mauvais":"#dc2626","N/A":"#64748b","—":"#475569"};
const CK=[{id:"keys",l:"Clés remises",t:"number"},{id:"badges",l:"Badges / Bips",t:"number"},{id:"telecommandes",l:"Télécommandes",t:"number"},{id:"water",l:"Compteur eau",t:"number"},{id:"elec",l:"Compteur élec",t:"number"},{id:"gas",l:"Compteur gaz",t:"number"},{id:"boilerBrand",l:"Marque chaudière",t:"text"},{id:"boilerDate",l:"Entretien chaudière",t:"date"},{id:"daaf",l:"Détecteur fumée",t:"check"},{id:"extincteur",l:"Extincteur",t:"check"},{id:"interphone",l:"Interphone OK",t:"check"},{id:"bal",l:"Boîte aux lettres OK",t:"check"},{id:"parkNum",l:"N° parking",t:"text"},{id:"caveNum",l:"N° cave",t:"text"}];

let S={edls:[],view:"list",cur:null,cr:0,exp:{},showNew:false,showAR:false,showAE:false,cdel:null,fDiff:false,nType:"Entrée",showSTpl:false};
let pTgt=null,selTp=null;

// IndexedDB
let db;
const odb=()=>new Promise((ok,no)=>{const r=indexedDB.open("edl-ph-v3",1);r.onupgradeneeded=e=>e.target.result.createObjectStore("p",{keyPath:"id"});r.onsuccess=e=>{db=e.target.result;ok()};r.onerror=no});
const sP=(id,d)=>new Promise(ok=>{const tx=db.transaction("p","readwrite");tx.objectStore("p").put({id,d});tx.oncomplete=ok});
const gP=id=>new Promise(ok=>{const tx=db.transaction("p","readonly");const r=tx.objectStore("p").get(id);r.onsuccess=()=>ok(r.result?.d||null);r.onerror=()=>ok(null)});
const dP=id=>new Promise(ok=>{const tx=db.transaction("p","readwrite");tx.objectStore("p").delete(id);tx.oncomplete=ok});

const LK="edl-v7",TK="edl-tpl-v1";
const ld=()=>{try{return JSON.parse(localStorage.getItem(LK))||[]}catch{return[]}};
const ldT=()=>{try{return JSON.parse(localStorage.getItem(TK))||[]}catch{return[]}};
const svT=t=>localStorage.setItem(TK,JSON.stringify(t));
const h=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const pid=()=>"p"+Date.now()+"_"+Math.random().toString(36).substr(2,6);
const uid2=()=>"e"+Date.now()+"_"+Math.random().toString(36).substr(2,6);
const ts=m=>{const t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)};
const nw=()=>new Date().toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
const tAgo=ts2=>{if(!ts2)return"";const d=Date.now()-ts2,m=Math.floor(d/60000);if(m<1)return"à l'instant";if(m<60)return m+"min";const hr=Math.floor(m/60);if(hr<24)return hr+"h";return Math.floor(hr/24)+"j"};

let svTO;
function autoSave(){clearTimeout(svTO);showSI("saving");svTO=setTimeout(()=>{if(S.cur!==null&&S.edls[S.cur])S.edls[S.cur]._lm=Date.now();localStorage.setItem(LK,JSON.stringify(S.edls));showSI("saved")},400)}
function showSI(s){const el=document.getElementById("si");el.className="save-ind "+s;el.textContent=s==="saved"?"✓ Sauvegardé":"⏳ Sauvegarde...";if(s==="saved")setTimeout(()=>{el.style.opacity="0"},1500)}

const comp=(f,mx=800,q=0.7)=>new Promise(ok=>{const r=new FileReader();r.onload=e=>{const i=new Image();i.onload=()=>{const c=document.createElement("canvas");let w=i.width,ht=i.height;if(w>mx){ht=ht*(mx/w);w=mx}c.width=w;c.height=ht;const ctx=c.getContext("2d");ctx.drawImage(i,0,0,w,ht);const stamp=nw()+" — "+(cRoom()?.name||"");ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,ht-22,w,22);ctx.fillStyle="#fff";ctx.font="bold 11px sans-serif";ctx.fillText(stamp,6,ht-7);ok(c.toDataURL("image/jpeg",q))};i.src=e.target.result};r.readAsDataURL(f)});
const mkEl=n=>({name:n,eE:"—",oE:"",pE:[],eS:"—",oS:"",pS:[]});
const cEdl=()=>S.edls[S.cur];
const cRoom=()=>{const e=cEdl();return e?.rooms?.[S.cr]||null};
const ring=(p,l,c)=>{const r=22,ci=2*Math.PI*r;return`<div style="text-align:center"><svg width="54" height="54" viewBox="0 0 54 54"><circle cx="27" cy="27" r="${r}" fill="none" stroke="var(--border)" stroke-width="4.5"/><circle cx="27" cy="27" r="${r}" fill="none" stroke="${c}" stroke-width="4.5" stroke-dasharray="${ci}" stroke-dashoffset="${ci-ci*p/100}" stroke-linecap="round" transform="rotate(-90 27 27)"/><text x="27" y="31" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700">${p}%</text></svg><div style="font-size:10px;color:var(--dim);margin-top:2px">${l}</div></div>`};
const prog=e=>{let tE=0,dE=0,tS=0,dS=0;e.rooms.forEach(r=>r.elements.forEach(el=>{tE++;tS++;if(el.eE&&el.eE!=="—")dE++;if(el.eS&&el.eS!=="—")dS++}));return{pE:tE?Math.round(dE/tE*100):0,pS:tS?Math.round(dS/tS*100):0}};

function R(){const a=document.getElementById("app");
switch(S.view){case"list":a.innerHTML=rList();break;case"edit":a.innerHTML=rEdit();break;case"rooms":a.innerHTML=rRooms();break;case"check":a.innerHTML=rCheck();break;case"sigs":a.innerHTML=rSigs();break;case"sum":a.innerHTML=rSum();break;case"exp":a.innerHTML=rExp();break}
B();lTh()}

// ── TABS helper ──
function tabs(active){
return`<div class="tabs"><button class="tab ${active==="edit"?"active":""}" data-a="goEdit">Infos</button><button class="tab ${active==="rooms"?"active":""}" data-a="goRooms">Pièces</button><button class="tab ${active==="check"?"active":""}" data-a="goCheck">Checklist</button><button class="tab ${active==="sigs"?"active":""}" data-a="goSigs">Signatures</button><button class="tab ${active==="sum"?"active":""}" data-a="goSum">Résumé</button><button class="tab ${active==="exp"?"active":""}" data-a="goExp">Export</button></div>`}

// ── LIST ──
function rList(){
let cards=S.edls.map((e,i)=>{const np=e.rooms.reduce((s,r)=>s+r.elements.reduce((s2,el)=>s2+(el.pE?.length||0)+(el.pS?.length||0),0),0);const ne=(e._lm||0)>(e._le||0);const wb=ne?`<span class="badge-w badge" style="margin-left:4px">⚠ Non exporté${e._lm?" — "+tAgo(e._lm):""}</span>`:"";
return`<div class="card" data-a="oEdl" data-i="${i}"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:15px;margin-bottom:3px">${h(e.name||"Sans nom")}${wb}</div><div style="font-size:12px;color:var(--muted)">${h(e.address||"")}</div><div style="font-size:12px;color:var(--dim);margin-top:4px">${e.rooms.length} pièce${e.rooms.length>1?"s":""} · ${e.date||"—"}${np?" · 📷"+np:""}</div></div><span class="badge badge-${e.type==="Entrée"?"e":"s"}">${e.type}</span></div><div style="display:flex;gap:6px;margin-top:8px"><button class="btn btn-s btn-sm" data-a="dup" data-i="${i}" onclick="event.stopPropagation()">Dupliquer</button><button class="btn btn-s btn-sm" data-a="expQ" data-i="${i}" onclick="event.stopPropagation()">Exporter</button><button class="btn btn-d btn-sm" data-a="askDel" data-i="${i}" onclick="event.stopPropagation()">Supprimer</button></div></div>`}).join("");

if(r.photos?.length){rpt+=`<div class="room-photos">`;r.photos.forEach(p=>{if(pm[p])rpt+=`<img src="${pm[p]}">`});rpt+=`</div>`}
rpt+=`<table class="el-table"><thead><tr><th style="width:20%">Élément</th><th style="width:12%">État entrée</th><th style="width:18%">Observations</th><th style="width:12%">État sortie</th><th style="width:18%">Observations</th><th style="width:20%">Photos</th></tr></thead><tbody>`;
r.elements.forEach(el=>{
const isDiff=el.eE!=="—"&&el.eS!=="—"&&el.eE!==el.eS;
rpt+=`<tr${isDiff?' class="diff"':""}>`;
rpt+=`<td style="font-weight:600">${H(el.name)}</td>`;
rpt+=`<td class="etat" style="color:${eColor(el.eE)}">${eDot(el.eE)}${el.eE==="—"?"—":H(el.eE)}</td>`;
rpt+=`<td class="obs">${H(el.oE)||"—"}</td>`;
rpt+=`<td class="etat" style="color:${eColor(el.eS)}">${eDot(el.eS)}${el.eS==="—"?"—":H(el.eS)}</td>`;
rpt+=`<td class="obs">${H(el.oS)||"—"}</td>`;
rpt+=`<td><div class="el-photos">`;
(el.pE||[]).forEach(p=>{if(pm[p])rpt+=`<img src="${pm[p]}">`});
(el.pS||[]).forEach(p=>{if(pm[p])rpt+=`<img src="${pm[p]}">`});
rpt+=`</div></td></tr>`});
rpt+=`</tbody></table>`});

// Signatures
rpt+=`<div class="section-title">Signatures</div><div class="sig-section">`;
// Locataire
rpt+=`<div class="sig-block"><div class="sig-role">Le locataire</div><div class="sig-name">${H(e.tenant||"")}</div><div class="sig-mention">Je reconnais exactes les constatations ci-dessus sur l'état du logement</div>`;
if(e.sigs?.loc)rpt+=`<img src="${e.sigs.loc}"><div class="sig-date">${H(e.sigs.locD||"")}</div>`;
else rpt+=`<div class="sig-empty">Signature</div>`;
rpt+=`</div>`;
// Bailleur
rpt+=`<div class="sig-block"><div class="sig-role">Le bailleur</div><div class="sig-name">${H(e.owner||"")}</div><div class="sig-mention">Je reconnais exactes les constatations ci-dessus sur l'état du logement</div>`;
if(e.sigs?.bail)rpt+=`<img src="${e.sigs.bail}"><div class="sig-date">${H(e.sigs.bailD||"")}</div>`;
else rpt+=`<div class="sig-empty">Signature</div>`;
rpt+=`</div></div>`;

// Footer
rpt+=`<div class="footer"><span>État des lieux — ${H(e.name)} — ${H(e.address)}</span><span>Document généré le ${new Date().toLocaleDateString("fr-FR")} à ${new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</span></div>`;

// Open in new window for clean print
const w=window.open("","_blank");
if(!w){ts("Autorise les popups pour imprimer");return}
w.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'><title>EDL — "+H(e.name)+"</title></head><body>"+rpt+"</body></html>");
w.document.close();
w.onload=()=>{setTimeout(()=>{w.print();w.onafterprint=()=>w.close()},400)};
e._le=Date.now();autoSave()}

// Beforeunload
window.addEventListener("beforeunload",e=>{if(S.edls.some(x=>(x._lm||0)>(x._le||0))){e.preventDefault();e.returnValue="Modifications non exportées."}});

// Service Worker
if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});

// Init
odb().then(()=>{S.edls=ld();S.edls.forEach(e=>{if(!e.id)e.id=uid2();if(!e.ck)e.ck={};if(!e.sigs)e.sigs={}});autoSave();R()});
</script>
</body>
</html>
